<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="../../" />
  <link rel="icon" href="data:," />
  <title>Stage 5-3 CIP Analysis</title>
  <style>
    :root {
      --bg: #030507;
      --panel: rgba(3, 7, 11, 0.82);
      --line: rgba(130, 210, 255, 0.25);
      --text: #effaff;
      --muted: #9bb7c4;
      --accent: #6fe7ff;
      --warn: #ffce73;
      --bad: #ff7b6e;
      --ok: #93ffad;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #153244 0, transparent 35%), var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Yu Gothic", "Meiryo", sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #panel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: min(460px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      font-size: 12px;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 4px 0;
      color: var(--muted);
    }

    .row strong {
      color: var(--text);
      font-weight: 700;
      text-align: right;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }

    button {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-variant-numeric: tabular-nums;
    }

    th,
    td {
      padding: 4px 3px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    .warn {
      color: var(--warn);
    }

    .bad {
      color: var(--bad);
    }

    .ok {
      color: var(--ok);
    }

    #status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      max-width: min(760px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="1280" height="960"></canvas>
    <aside id="panel">
      <h1>Stage 5-3 CIP Analysis</h1>
      <div class="row"><span>Scenario</span><strong>0.5x for 3s, then 0.0x</strong></div>
      <div class="row"><span>Elapsed</span><strong id="elapsedValue">0.00s</strong></div>
      <div class="row"><span>Move speed</span><strong id="speedValue">0.50x</strong></div>
      <div class="row"><span>Object Y</span><strong id="objectValue">--</strong></div>
      <div class="row"><span>Top region</span><strong id="topSlitValue">--</strong></div>
      <div class="row"><span>Max speed</span><strong id="maxSpeedValue">--</strong></div>
      <div class="row"><span>Mean energy</span><strong id="energyValue">--</strong></div>
      <div class="controls">
        <button id="restartBtn" type="button">Restart Replay</button>
        <button id="csvBtn" type="button">Download CSV</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>t</th>
            <th>scale</th>
            <th>region</th>
            <th>max</th>
            <th>U</th>
            <th>V</th>
            <th>energy</th>
          </tr>
        </thead>
        <tbody id="sampleBody"></tbody>
      </table>
    </aside>
    <div id="status">Loading analysis replay...</div>
  </div>
  <script type="module" src="./analysis/stage53-cip/analysis.js"></script>
</body>
</html>
