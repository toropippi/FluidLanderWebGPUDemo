<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="../../" />
  <link rel="icon" href="data:," />
  <title>Stage 5-3 Visual Replay</title>
  <style>
    :root {
      --bg: #030507;
      --panel: rgba(5, 9, 13, 0.88);
      --line: rgba(132, 207, 255, 0.24);
      --text: #f1fbff;
      --muted: #9db5c3;
      --accent: #73e0ff;
      --warn: #ffd27d;
      --ok: #93ffad;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Yu Gothic", "Meiryo", sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #panel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: min(440px, calc(100vw - 24px));
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      font-size: 12px;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 15px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stats,
    .controls {
      display: grid;
      gap: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .row strong {
      color: var(--text);
      font-weight: 700;
      text-align: right;
    }

    .controls {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
    }

    .labelRow {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    input[type="number"] {
      width: 100%;
      min-height: 30px;
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
    }

    input[type="range"] {
      width: 100%;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    #status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      max-width: min(760px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
      white-space: pre-line;
    }

    .done {
      color: var(--ok);
    }

    .warn {
      color: var(--warn);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="1280" height="960"></canvas>
    <aside id="panel">
      <h1>Stage 5-3 Rotated Visual Replay</h1>
      <div class="stats">
        <div class="row"><span>Frame</span><strong id="frameValue">0 / 1280</strong></div>
        <div class="row"><span>Move speed</span><strong id="moveSpeedValue">0.50x horizontal</strong></div>
        <div class="row"><span>Object</span><strong id="objectValue">--</strong></div>
        <div class="row"><span>Render</span><strong id="renderValue">8 frames</strong></div>
        <div class="row"><span>State</span><strong id="stateValue">Loading</strong></div>
      </div>
      <div class="controls">
        <label>
          <span class="labelRow"><span>End frame</span><span id="endFrameLabel">1280</span></span>
          <input id="endFrameInput" type="number" min="1" max="100000" step="1" value="1280" />
        </label>
        <label>
          <span class="labelRow"><span>Stop frame</span><span id="stopFrameLabel">174</span></span>
          <input id="stopFrameInput" type="number" min="0" max="100000" step="1" value="174" />
        </label>
        <label>
          <span class="labelRow"><span>Before stop speed</span><span id="beforeSpeedLabel">0.50x</span></span>
          <input id="beforeSpeedSlider" type="range" min="-2" max="2" step="0.01" value="0.5" />
        </label>
        <label>
          <span class="labelRow"><span>After stop speed</span><span id="afterSpeedLabel">0.00x</span></span>
          <input id="afterSpeedSlider" type="range" min="-2" max="2" step="0.01" value="0" />
        </label>
        <label>
          <span class="labelRow"><span>Run speed</span><span id="stepsLabel">8 frames/tick</span></span>
          <input id="stepsSlider" type="range" min="1" max="120" step="1" value="8" />
        </label>
        <label>
          <span class="labelRow"><span>Render every</span><span id="renderLabel">8 frames</span></span>
          <input id="renderSlider" type="range" min="1" max="120" step="1" value="8" />
        </label>
        <div class="buttons">
          <button id="playBtn" type="button">Pause</button>
          <button id="resetBtn" type="button">Reset</button>
          <button id="applyBtn" type="button">Apply</button>
        </div>
      </div>
    </aside>
    <div id="status">Loading visual replay...</div>
  </div>
  <script type="module" src="./analysis/stage53-visual/visual.js"></script>
</body>
</html>
