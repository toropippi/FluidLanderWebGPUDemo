<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="../../" />
  <link rel="icon" href="data:," />
  <title>Stage 5-3 Velocity Diagnostics</title>
  <style>
    :root {
      --bg: #05070a;
      --panel: rgba(5, 9, 13, 0.88);
      --line: rgba(132, 207, 255, 0.24);
      --text: #f1fbff;
      --muted: #9db5c3;
      --accent: #73e0ff;
      --warn: #ffd27d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Yu Gothic", "Meiryo", sans-serif;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      width: 100%;
      height: 100%;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: 15px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #status {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .stats {
      display: grid;
      grid-auto-flow: column;
      gap: 18px;
      align-items: center;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
    }

    .stats span {
      color: var(--muted);
    }

    .stats strong {
      display: block;
      margin-top: 2px;
      color: var(--text);
      text-align: right;
    }

    button {
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    #chart {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div>
        <h1>Stage 5-3 Velocity Diagnostics</h1>
        <div id="status">Loading...</div>
      </div>
      <div class="stats">
        <div><span>Frame</span><strong id="frameValue">0</strong></div>
        <div><span>Energy Peak</span><strong id="peakValue">--</strong></div>
        <div><span>Max Speed</span><strong id="speedValue">--</strong></div>
        <div><span>First 0.15</span><strong id="firstValue">--</strong></div>
        <div><span>Snapshots</span><strong id="snapshotValue">0</strong></div>
        <button id="pngBtn" type="button">Download PNG</button>
        <button id="csvBtn" type="button">Download CSV</button>
      </div>
    </header>
    <canvas id="chart" width="1600" height="900"></canvas>
  </div>
  <script type="module" src="./analysis/stage53-energy/energy.js"></script>
</body>
</html>
