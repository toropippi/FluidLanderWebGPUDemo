    body {
      margin: 0;
      background: #05070a;
      color: #f1fbff;

    header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(132, 207, 255, 0.24);

    table {

      border-collapse: collapse;

    td:first-child,
