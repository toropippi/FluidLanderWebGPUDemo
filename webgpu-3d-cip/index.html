<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>WebGPU 3D CIP</title>
  <style>
    :root {
      --bg: #7fb1f4;
      --panel: rgba(18, 24, 32, 0.68);
      --line: rgba(255, 255, 255, 0.18);
      --text: #f5f8fb;
      --muted: #b9c6d3;
      --accent: #9ecbff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic", Meiryo, sans-serif;
    }

    #app,
    canvas {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      background: var(--bg);
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      width: min(360px, calc(100vw - 24px));
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.22);
      font-size: 13px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--accent);
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 5px 14px;
      color: var(--muted);
    }

    .stats strong {
      color: var(--text);
      font-weight: 650;
      text-align: right;
    }

    .controls {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    #energyChart {
      width: 100%;
      height: 88px;
      margin-top: 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: rgba(2, 6, 10, 0.24);
    }

    .control {
      display: grid;
      grid-template-columns: 92px 1fr 46px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
    }

    input[type="range"] {
      width: 100%;
    }

    button {
      min-height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    #status {
      position: absolute;
      right: 12px;
      bottom: 12px;
      max-width: min(680px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      white-space: pre-line;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="view"></canvas>
    <aside id="hud">
      <div class="title">WebGPU 3D CIP</div>
      <div class="stats">
        <span>CFD frame</span><strong id="frameValue">0</strong>
        <span>FPS</span><strong id="fpsValue">--</strong>
        <span>Particles</span><strong id="particleValue">--</strong>
        <span>Pressure</span><strong id="pressureValue">64</strong>
        <span>Config</span><strong id="configValue">--</strong>
        <span>Energy</span><strong id="energyValue">--</strong>
        <span>Max speed</span><strong id="maxSpeedValue">--</strong>
        <span>Div RMS</span><strong id="divValue">--</strong>
        <span>Warmup</span><strong id="warmupValue">on</strong>
      </div>
      <div class="controls">
        <button id="toggleButton" type="button">Pause</button>
        <button id="resetButton" type="button">Reset</button>
        <div class="control">
          <label for="stepsSlider">steps</label>
          <input id="stepsSlider" type="range" min="0" max="64" step="1" value="1" />
          <output id="stepsValue">1</output>
        </div>
        <div class="control">
          <label for="pressureSlider">pressure</label>
          <input id="pressureSlider" type="range" min="0" max="256" step="16" value="64" />
          <output id="pressureOut">64</output>
        </div>
        <div class="control">
          <label for="sizeSlider">size</label>
          <input id="sizeSlider" type="range" min="0.5" max="4" step="0.25" value="1.5" />
          <output id="sizeValue">1.5</output>
        </div>
        <div class="control">
          <label for="zoomSlider">zoom</label>
          <input id="zoomSlider" type="range" min="0.65" max="2.5" step="0.05" value="1.0" />
          <output id="zoomValue">1.0</output>
        </div>
        <div class="control">
          <label for="yawSlider">yaw</label>
          <input id="yawSlider" type="range" min="-90" max="90" step="1" value="0" />
          <output id="yawValue">0</output>
        </div>
      </div>
      <canvas id="energyChart" width="320" height="88"></canvas>
    </aside>
    <div id="status">Initializing WebGPU...</div>
  </div>
  <script type="module" src="./cip3d.js"></script>
</body>
</html>
