<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>FluidLander Browser Port</title>
  <style>
    :root {
      --bg: #05070a;
      --panel: rgba(5, 8, 13, 0.78);
      --line: rgba(180, 220, 255, 0.26);
      --text: #eef8ff;
      --muted: #a9c0d0;
      --accent: #7ee2ff;
      --danger: #ff806d;
      --ok: #9dffb4;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 15%, #163047 0, transparent 32%),
        radial-gradient(circle at 82% 70%, #2d1c14 0, transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Yu Gothic", "Meiryo", sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
      background: #000;
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      width: min(360px, calc(100vw - 24px));
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
      font-size: 13px;
    }

    #hud h1 {
      margin: 0 0 10px;
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 6px 0;
      color: var(--muted);
    }

    .row strong {
      color: var(--text);
      font-weight: 700;
      text-align: right;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    button,
    select {
      min-height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 9px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:hover,
    select:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .sliderRow {
      grid-column: 1 / -1;
      display: none;
      gap: 8px;
      align-items: center;
      color: var(--muted);
    }

    .sliderRow.visible {
      display: grid;
      grid-template-columns: auto 1fr 46px;
    }

    input[type="range"] {
      width: 100%;
    }

    #status {
      position: absolute;
      left: 12px;
      bottom: 12px;
      max-width: min(680px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      white-space: pre-line;
    }

    .danger {
      color: var(--danger);
    }

    .ok {
      color: var(--ok);
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="1280" height="960"></canvas>
    <aside id="hud">
      <h1>FluidLander Port</h1>
      <div class="row"><span>Stage</span><strong id="stageValue">--</strong></div>
      <div class="row"><span>Time</span><strong id="timeValue">0.00</strong></div>
      <div class="row"><span>HP</span><strong id="hpValue">128</strong></div>
      <div class="row"><span>Rare Earth</span><strong id="rareValue">0 / 0</strong></div>
      <div class="row"><span>Goal</span><strong id="goalValue">Locked</strong></div>
      <div class="row"><span>FPS</span><strong id="fpsValue">--</strong></div>
      <div class="controls">
        <select id="stageSelect" aria-label="stage select">
          <option value="1-2">1-2</option>
          <option value="2-1">2-1</option>
          <option value="5-2">5-2</option>
          <option value="5-3">5-3</option>
          <option value="5-3modify">5-3modify</option>
        </select>
        <button id="restartBtn" type="button">Restart</button>
        <label class="sliderRow" id="moveSpeedRow">
          <span>Move speed</span>
          <input id="moveSpeedSlider" type="range" min="0" max="1" step="0.01" value="0.2" />
          <strong id="moveSpeedValue">0.20x</strong>
        </label>
      </div>
    </aside>
    <div id="status">Loading assets...</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
