<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Stable 3D CIP Validation</title>
  <style>
    :root {
      --bg: #10161f;
      --panel: #182230;
      --line: rgba(255, 255, 255, 0.16);
      --text: #eef5fb;
      --muted: #aebdcb;
      --pass: #80e6a1;
      --fail: #ff8d78;
      --accent: #a6d2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Yu Gothic", Meiryo, sans-serif;
      font-size: 14px;
    }

    main {
      width: min(1120px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    h1 {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 20px;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      min-height: 34px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #253449;
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: #2e4059;
    }

    #summary {
      margin-bottom: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      white-space: pre-line;
    }

    #summary.pass {
      color: var(--pass);
    }

    #summary.fail {
      color: var(--fail);
    }

    pre {
      overflow: auto;
      min-height: 360px;
      margin: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1119;
      color: #d9e8f5;
      font: 12px/1.5 Consolas, "Cascadia Mono", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>Stable 3D CIP Validation</h1>
    <div class="toolbar">
      <button id="runDefault" type="button">Run Default</button>
      <button id="runQuick" type="button">Run Quick</button>
    </div>
    <div id="summary">Initializing WebGPU...</div>
    <pre id="output"></pre>
  </main>
  <script type="module" src="./validate3d.js"></script>
</body>
</html>
